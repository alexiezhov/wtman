version: 2
updates:
  # Keep the SHA-pinned GitHub Actions current (Dependabot bumps the pin and
  # annotates the PR with the human-readable version).
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]

  # Go module dependencies.
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
    groups:
      go-deps:
        patterns: ["*"]
