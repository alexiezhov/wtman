name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Release & Publish to Homebrew
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: set up go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: stable

      - name: run goreleaser
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          version: latest
          args: release --clean
        env:
          # Fine-grained PAT scoped to alexiezhov/wtman + alexiezhov/homebrew-apps
          # with Repository permissions -> Contents: Read and write.
          # Creates the GitHub Release here and pushes the cask to homebrew-apps.
          GITHUB_TOKEN: ${{ secrets.GORELEASER_GITHUB_TOKEN }}
